<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathMagique</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
background:#1e293b;
}

.section{display:none;padding:15px;}
.active{display:block;}

.card{
background:#1e293b;
padding:20px;
border-radius:18px;
margin-bottom:15px;
}

button{
width:100%;
padding:18px;
margin-top:12px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
background:#22c55e;
color:white;
}

input{
width:100%;
padding:18px;
font-size:22px;
border-radius:12px;
border:none;
margin-top:10px;
color:black;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#1e293b;
}

.nav button{
flex:1;
font-size:20px;
padding:15px;
}

.bar{
height:12px;
background:#22c55e;
width:0%;
border-radius:10px;
}

h2{font-size:24px;}
h3{margin-top:15px;}
p{font-size:17px;line-height:1.5;}
</style>
</head>

<body>

<header>🧠 MathMagique</header>

<!-- ACCUEIL -->
<div id="accueil" class="section active">
<div class="card">
<h2>Progression</h2>
<p>XP : <span id="xp"></span></p>
<p>Niveau : <span id="diff"></span></p>
<div class="bar" id="bar"></div>
</div>

<div class="card">
<h2>Choisir un chapitre</h2>
<button onclick="ouvrirCours('addition')">Addition</button>
<button onclick="ouvrirCours('fractions')">Fractions</button>
<button onclick="ouvrirCours('equations')">Équations</button>
<button onclick="ouvrirCours('pythagore')">Pythagore</button>
</div>
</div>

<!-- COURS -->
<div id="cours" class="section">
<div class="card" id="contenuCours"></div>
<button onclick="lancerQuiz()">S'entraîner</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="section">
<div class="card">
<h2 id="question"></h2>
<input id="reponse" placeholder="Ta réponse">
<button onclick="verifier()">Valider</button>
<p id="feedback"></p>
</div>
</div>

<!-- NAVIGATION -->
<div class="nav">
<button onclick="afficher('accueil')">🏠</button>
<button onclick="afficher('cours')">📚</button>
<button onclick="afficher('quiz')">🎮</button>
</div>

<script>

let etat = JSON.parse(localStorage.getItem("mathmagique")) || {
xp:0,
difficulte:1,
chapitre:"addition"
};

let bonneReponse = 0;

/* SON */
function jouerSon(){
let audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3");
audio.play();
}

/* NAVIGATION */
function afficher(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* COURS */
function ouvrirCours(chap){
etat.chapitre = chap;
afficher("cours");

let texte = "";

if(chap==="addition"){
texte = `
<h2>Addition</h2>
<p>L’addition permet d’additionner plusieurs nombres.</p>

<h3>Exemple :</h3>
<p>15 + 5 = 20</p>

<h3>Propriétés :</h3>
<p>• a + b = b + a</p>
<p>• (a + b) + c = a + (b + c)</p>

<h3>Astuce :</h3>
<p>Décompose : 15 + 5 = 10 + 10</p>
`;
}

if(chap==="fractions"){
texte = `
<h2>Fractions</h2>
<p>Une fraction représente une partie d’un tout.</p>

<h3>Exemple :</h3>
<p>1/2 + 1/2 = 1</p>

<h3>Règle :</h3>
<p>Les dénominateurs doivent être identiques.</p>

<h3>Exemple :</h3>
<p>1/3 + 2/3 = 3/3 = 1</p>
`;
}

if(chap==="equations"){
texte = `
<h2>Équations</h2>
<p>Une équation permet de trouver une inconnue.</p>

<h3>Exemple :</h3>
<p>x + 5 = 9</p>

<h3>Solution :</h3>
<p>x = 9 - 5 = 4</p>

<h3>Règle :</h3>
<p>On fait la même opération des deux côtés.</p>
`;
}

if(chap==="pythagore"){
texte = `
<h2>Théorème de Pythagore</h2>

<p>Dans un triangle rectangle :</p>

<p><b>a² + b² = c²</b></p>

<h3>Exemple :</h3>
<p>3² + 4² = 25 → c = 5</p>
`;
}

document.getElementById("contenuCours").innerHTML = texte;
}

/* QUIZ */
function lancerQuiz(){
afficher("quiz");
nouvelleQuestion();
}

function nouvelleQuestion(){
let a = Math.floor(Math.random()*10)+1;
let b = Math.floor(Math.random()*10)+1;

if(etat.chapitre==="addition"){
bonneReponse = a + b;
question.innerText = a + " + " + b;
}

if(etat.chapitre==="fractions"){
bonneReponse = 1;
question.innerText = "1/2 + 1/2";
}

if(etat.chapitre==="equations"){
bonneReponse = 4;
question.innerText = "x + 5 = 9";
}

if(etat.chapitre==="pythagore"){
bonneReponse = 5;
question.innerText = "3² + 4² = ?";
}
}

/* VERIFICATION */
function verifier(){
let val = parseInt(document.getElementById("reponse").value);

if(val === bonneReponse){
feedback.innerText = "✅ Bonne réponse !";
jouerSon();
etat.xp++;
etat.difficulte += 0.2;
}else{
feedback.innerText = "❌ Mauvaise réponse. Réponse : " + bonneReponse;
etat.difficulte -= 0.2;
}

if(etat.difficulte < 1) etat.difficulte = 1;

sauvegarder();
mettreAJour();
nouvelleQuestion();
}

/* SAUVEGARDE */
function sauvegarder(){
localStorage.setItem("mathmagique", JSON.stringify(etat));
}

/* UI */
function mettreAJour(){
xp.innerText = etat.xp;
diff.innerText = etat.difficulte.toFixed(1);
bar.style.width = (etat.xp % 10) * 10 + "%";
}

mettreAJour();

</script>

</body>
</html>
