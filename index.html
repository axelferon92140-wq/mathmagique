<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathMagique PRO</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#0f172a;
color:white;
}

/* HEADER */
header{
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
background:#1e293b;
}

/* SECTIONS */
.section{display:none;padding:15px;}
.active{display:block;}

/* CARD */
.card{
background:#1e293b;
padding:20px;
border-radius:18px;
margin-bottom:15px;
}

/* GROS BOUTONS */
button{
width:100%;
padding:18px;
margin-top:12px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
background:#22c55e;
color:white;
}

/* INPUT FIX */
input{
width:100%;
padding:18px;
font-size:22px;
border-radius:12px;
border:none;
margin-top:10px;
color:black;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#1e293b;
}

.nav button{
flex:1;
font-size:20px;
padding:15px;
}

/* PROGRESS */
.bar{
height:12px;
background:#22c55e;
width:0%;
border-radius:10px;
}

/* TITRES */
h2{
font-size:24px;
margin-bottom:10px;
}

p{
font-size:17px;
line-height:1.5;
}
</style>
</head>

<body>

<header>🧠 MathMagique PRO</header>

<!-- HOME -->
<div id="home" class="section active">
<div class="card">
<h2>Progression</h2>
<p>XP: <span id="xp"></span></p>
<p>Difficulté: <span id="diff"></span></p>
<div class="bar" id="bar"></div>
</div>

<div class="card">
<h2>Choisir un chapitre</h2>
<button onclick="lesson('add')">Addition</button>
<button onclick="lesson('fraction')">Fractions</button>
<button onclick="lesson('equation')">Équations</button>
<button onclick="lesson('pythagore')">Pythagore</button>
</div>
</div>

<!-- COURS -->
<div id="lesson" class="section">
<div class="card" id="content"></div>
<button onclick="startQuiz()">S'entraîner</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="section">
<div class="card">
<h2 id="q"></h2>
<input id="rep" placeholder="Ta réponse">
<button onclick="check()">Valider</button>
<p id="fb"></p>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">🏠</button>
<button onclick="show('lesson')">📚</button>
<button onclick="show('quiz')">🎮</button>
</div>

<script>

let state = JSON.parse(localStorage.getItem("math")) || {
xp:0,
difficulty:1,
lesson:"add"
};

let correct = 0;

/* NAV */
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* COURS ULTRA DÉTAILLÉS */
function lesson(id){
state.lesson=id;
show("lesson");

let c="";

if(id==="add"){
c=`
<h2>Addition</h2>
<p>L’addition permet d’assembler plusieurs nombres pour obtenir un total.</p>

<h3>Exemple :</h3>
<p>12 + 8 = 20</p>

<h3>Propriétés :</h3>
<p>• Commutativité : a + b = b + a</p>
<p>• Associativité : (a + b) + c = a + (b + c)</p>

<h3>Astuce :</h3>
<p>12 + 8 → (10 + 2) + 8 → 10 + 10 = 20</p>

<h3>À retenir :</h3>
<p>L’addition est la base de toutes les opérations.</p>
`;
}

if(id==="fraction"){
c=`
<h2>Fractions</h2>
<p>Une fraction représente une partie d’un tout.</p>

<h3>Exemple :</h3>
<p>1/2 + 1/2 = 1</p>

<h3>Règle :</h3>
<p>Pour additionner :</p>
<p>→ même dénominateur obligatoire</p>

<h3>Exemple :</h3>
<p>1/3 + 2/3 = 3/3 = 1</p>

<h3>Attention :</h3>
<p>1/2 + 1/3 ≠ 2/5</p>
`;
}

if(id==="equation"){
c=`
<h2>Équations</h2>
<p>Une équation sert à trouver une inconnue.</p>

<h3>Exemple :</h3>
<p>x + 5 = 9</p>

<h3>Méthode :</h3>
<p>On isole x :</p>
<p>x = 9 - 5</p>
<p>x = 4</p>

<h3>Règle :</h3>
<p>On fait la même opération des deux côtés.</p>
`;
}

if(id==="pythagore"){
c=`
<h2>Théorème de Pythagore</h2>

<p>Dans un triangle rectangle :</p>

<p><b>a² + b² = c²</b></p>

<h3>Exemple :</h3>
<p>3² + 4² = 9 + 16 = 25</p>
<p>c = 5</p>

<h3>Condition :</h3>
<p>Le triangle doit être rectangle.</p>
`;
}

document.getElementById("content").innerHTML=c;
}

/* QUIZ */
function startQuiz(){
show("quiz");
newQ();
}

function newQ(){
let a = Math.floor(Math.random()*10)+1;
let b = Math.floor(Math.random()*10)+1;

if(state.lesson==="add"){
correct = a+b;
document.getElementById("q").innerText = a+" + "+b;
}

if(state.lesson==="fraction"){
correct = 1;
document.getElementById("q").innerText = "1/2 + 1/2";
}

if(state.lesson==="equation"){
correct = 4;
document.getElementById("q").innerText = "x + 5 = 9";
}

if(state.lesson==="pythagore"){
correct = 5;
document.getElementById("q").innerText = "3² + 4² = ?";
}
}

/* CHECK */
function check(){
let val = parseInt(document.getElementById("rep").value);

if(val === correct){
document.getElementById("fb").innerText="✅ Bonne réponse !";
state.xp++;
state.difficulty += 0.2;
}else{
document.getElementById("fb").innerText="❌ Mauvaise réponse. Réponse: "+correct;
state.difficulty -= 0.2;
}

if(state.difficulty<1) state.difficulty=1;

save();
update();
newQ();
}

/* SAVE */
function save(){
localStorage.setItem("math", JSON.stringify(state));
}

/* UI */
function update(){
document.getElementById("xp").innerText = state.xp;
document.getElementById("diff").innerText = state.difficulty.toFixed(1);
document.getElementById("bar").style.width = (state.xp%10)*10+"%";
}

update();

</script>

</body>
</html>
