<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathMagique Ultimate</title>

<link rel="apple-touch-icon" href="icon.png">

<!-- AJOUTE ÇA où tu veux dans index.html -->
<div class="menu-img">
  <img src="images/calcul.jpg">
  <img src="images/geometrie.jpg">
</div>

<style>
body{
margin:0;
font-family:-apple-system;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
background:#1e293b;
}

.section{display:none;padding:15px;}
.active{display:block;}

.card{
background:#1e293b;
padding:20px;
border-radius:18px;
margin-bottom:15px;
}

button{
width:100%;
padding:18px;
margin-top:12px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
background:#22c55e;
color:white;
}

input{
width:100%;
padding:18px;
font-size:22px;
border-radius:12px;
border:none;
margin-top:10px;
color:black;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#1e293b;
}

.nav button{flex:1;font-size:18px;}

.bar{
height:12px;
background:#22c55e;
width:0%;
border-radius:10px;
margin-top:10px;
}

.avatar{
font-size:70px;
text-align:center;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

.leader{
font-size:14px;
margin-top:10px;
}

h2{font-size:24px;}
h3{margin-top:15px;}
p{font-size:17px;line-height:1.5;}
</style>
</head>

<body>

<header>🧠 MathMagique Ultimate</header>

<!-- ACCUEIL -->
<div id="accueil" class="section active">

<div class="card">
<div class="avatar" id="avatar">🙂</div>
<p>XP : <span id="xp"></span></p>
<p>Niveau IA : <span id="diff"></span></p>
<div class="bar" id="bar"></div>
</div>

<div class="card">
<h3>🏆 Classement mondial</h3>
<div id="leaderboard" class="leader"></div>
</div>

</div>

<!-- COURS -->
<div id="cours" class="section">

<div class="card">
<h2>Choisir un cours</h2>
<button onclick="ouvrirCours('addition')">Addition</button>
<button onclick="ouvrirCours('fractions')">Fractions</button>
<button onclick="ouvrirCours('equation')">Équations</button>
<button onclick="ouvrirCours('pythagore')">Pythagore</button>
</div>

<div class="card" id="contenuCours"></div>
<button onclick="lancerQuiz()">S'entraîner</button>

</div>

<!-- QUIZ -->
<div id="quiz" class="section">
<div class="card">
<h2 id="question"></h2>
<input type="number" id="answer" inputmode="numeric" pattern="[0-9]*">
<button onclick="verifier()">Valider</button>
<p id="feedback"></p>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="afficher('accueil')">🏠</button>
<button onclick="afficher('cours')">📚</button>
<button onclick="afficher('quiz')">🎮</button>
</div>

<script>

let etat = JSON.parse(localStorage.getItem("mathmagique")) || {
xp:0,
difficulte:1,
chapitre:"addition"
};

let bonneReponse = 0;

/* SON */
function son(){
let audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3");
audio.play();
}

/* NAV */
function afficher(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* AVATAR */
function avatar(){
let a="🙂";
if(etat.xp>20) a="😎";
if(etat.xp>50) a="🤖";
if(etat.xp>100) a="👑";
document.getElementById("avatar").innerText=a;
}

/* LEADERBOARD FAKE */
function leaderboard(){
let noms=["Alex","Lina","Noah","Emma","Leo","Sofia","Milan","Chloé"];
let html="";
noms.forEach((n,i)=>{
let score = etat.xp + Math.floor(Math.random()*100);
html += `${i+1}. ${n} - ${score} XP<br>`;
});
document.getElementById("leaderboard").innerHTML=html;
}

/* COURS DETAILLES */
function ouvrirCours(c){
etat.chapitre=c;
afficher("cours");

let t="";

if(c==="addition"){
t=`
<h2>Addition</h2>
<p>L’addition permet d’additionner plusieurs nombres.</p>
<h3>Exemple :</h3>
<p>15 + 5 = 20</p>
<h3>Astuce :</h3>
<p>15 + 5 = 10 + 10</p>
`;
}

if(c==="fractions"){
t=`
<h2>Fractions</h2>
<p>Une fraction représente une partie d’un tout.</p>
<h3>Règle :</h3>
<p>Même dénominateur obligatoire.</p>
<h3>Exemple :</h3>
<p>1/3 + 2/3 = 1</p>
`;
}

if(c==="equation"){
t=`
<h2>Équations</h2>
<p>x + 5 = 9</p>
<p>x = 4</p>
`;
}

if(c==="pythagore"){
t=`
<h2>Pythagore</h2>
<p>a² + b² = c²</p>
<p>3² + 4² = 25 → c = 5</p>
`;
}

document.getElementById("contenuCours").innerHTML=t;
}

/* QUIZ */
function lancerQuiz(){
afficher("quiz");
nouvelleQuestion();
}

function nouvelleQuestion(){
reponse.value="";
feedback.innerText="";

let a=Math.floor(Math.random()*10)+1;
let b=Math.floor(Math.random()*10)+1;

if(etat.chapitre==="addition"){
bonneReponse=a+b;
question.innerText=a+" + "+b;
}

if(etat.chapitre==="fractions"){
bonneReponse=1;
question.innerText="1/2 + 1/2";
}

if(etat.chapitre==="equation"){
bonneReponse=4;
question.innerText="x + 5 = 9";
}

if(etat.chapitre==="pythagore"){
bonneReponse=5;
question.innerText="3² + 4² = ?";
}
}

/* CHECK */
function verifier(){
let val=parseInt(reponse.value);

if(val===bonneReponse){
feedback.innerText="✅ Bonne réponse !";
son();
etat.xp++;
etat.difficulte+=0.2;
}else{
feedback.innerText="❌ Réponse : "+bonneReponse;
etat.difficulte-=0.2;
}

if(etat.difficulte<1) etat.difficulte=1;

save();
update();

setTimeout(nouvelleQuestion,800);
}

/* SAVE */
function save(){
localStorage.setItem("mathmagique", JSON.stringify(etat));
}

/* UI */
function update(){
xp.innerText=etat.xp;
diff.innerText=etat.difficulte.toFixed(1);
bar.style.width=(etat.xp%10)*10+"%";

avatar();
leaderboard();
}

update();

</script>

</body>
</html>
