<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>MathMagique PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:-apple-system;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:15px;
background:#1e293b;
font-weight:bold;
font-size:18px;
}

.section{display:none;padding:15px;}
.active{display:block;}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin-top:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
background:#22c55e;
color:white;
font-size:16px;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#1e293b;
}

.nav button{flex:1;background:#1e293b;}

.progress{
height:10px;
background:#334155;
border-radius:10px;
margin-top:10px;
}

.bar{
height:100%;
background:#22c55e;
width:0%;
}

.hearts{text-align:center;font-size:22px;}
#avatar{text-align:center;font-size:60px;}

img{
width:100%;
border-radius:12px;
margin-top:10px;
}

.lock{opacity:0.4;}
</style>
</head>

<body>

<header>🔥 MathMagique PRO</header>

<!-- HOME -->
<div id="home" class="section active">

<div class="card">
<p>🔥 Streak: <span id="streak"></span></p>
<div class="hearts" id="hearts"></div>
</div>

<div class="card">
<h3>📚 Parcours</h3>
<div id="levels"></div>
</div>

<div class="card">
<h3>🏆 Badges</h3>
<p id="badges"></p>
</div>

</div>

<!-- LESSON -->
<div id="lesson" class="section">
<div class="card" id="lessonContent"></div>
<button onclick="startQuiz()">S'entraîner</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="section">
<div class="card">
<h2 id="q"></h2>
<input id="rep" type="number" placeholder="Ta réponse">
<button onclick="check()">Valider</button>
<p id="feedback"></p>

<div class="progress"><div class="bar" id="bar"></div></div>
</div>
</div>

<!-- PROFIL -->
<div id="profil" class="section">
<div id="avatar"></div>
<div class="card">
<p id="level"></p>
<p id="rank"></p>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">🏠</button>
<button onclick="show('lesson')">📚</button>
<button onclick="show('quiz')">🎮</button>
<button onclick="show('profil')">👤</button>
</div>

<!-- SOUNDS -->
<audio id="good" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="bad" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

// NAV
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// DATA
let state = JSON.parse(localStorage.getItem("state")) || {
xp:0,
hearts:3,
streak:1,
level:0
};

let lessons = [
{id:"add", name:"Addition"},
{id:"multi", name:"Multiplication"},
{id:"fraction", name:"Fractions"},
{id:"equation", name:"Équations"}
];

let currentLesson="";
let correct;

// LOAD LEVELS
function loadLevels(){
let html="";
lessons.forEach((l,i)=>{
let locked = i > state.level;
html += `<button ${locked?'class="lock"':''} onclick="openLesson('${l.id}',${locked})">${l.name}</button>`;
});
document.getElementById("levels").innerHTML=html;
}

// LESSON CONTENT (AVEC IMAGES)
function openLesson(id,locked){
if(locked){alert("🔒 Niveau verrouillé");return;}

currentLesson=id;
show("lesson");

let c="";

if(id==="add"){
c=`
<h3>Addition</h3>
<p>L'addition consiste à additionner deux nombres.</p>
<p>Exemple : 2 + 3 = 5</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Elementary_addition.svg">
`;
}

if(id==="multi"){
c=`
<h3>Multiplication</h3>
<p>Multiplier, c’est additionner plusieurs fois.</p>
<p>Exemple : 3 × 4 = 12</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/0/06/Multiplication_3x4.svg">
`;
}

if(id==="fraction"){
c=`
<h3>Fractions</h3>
<p>Une fraction représente une partie.</p>
<p>1/2 + 1/2 = 1</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/8/8c/Fraction_1_2.svg">
`;
}

if(id==="equation"){
c=`
<h3>Équations</h3>
<p>Une équation contient une inconnue.</p>
<p>x + 2 = 5 → x = 3</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5a/Linear_equation_graph.svg">
`;
}

document.getElementById("lessonContent").innerHTML=c;
}

// QUIZ
function startQuiz(){
show("quiz");
newQ();
}

function newQ(){
let a=Math.floor(Math.random()*10)+1;
let b=Math.floor(Math.random()*10)+1;

if(currentLesson==="add"){
correct=a+b;
document.getElementById("q").innerText = a+" + "+b;
}

if(currentLesson==="multi"){
correct=a*b;
document.getElementById("q").innerText = a+" × "+b;
}

if(currentLesson==="fraction"){
correct=1;
document.getElementById("q").innerText = "1/2 + 1/2";
}

if(currentLesson==="equation"){
correct=3;
document.getElementById("q").innerText = "x + 2 = 5 → x = ?";
}
}

function check(){
let r=parseInt(document.getElementById("rep").value);

if(r===correct){
state.xp++;
document.getElementById("feedback").innerText="✅ Bonne réponse";
document.getElementById("good").play();
}else{
state.hearts--;
document.getElementById("feedback").innerText="❌ Mauvaise réponse ( "+correct+" )";
document.getElementById("bad").play();
}

state.level=Math.floor(state.xp/10);

save();
updateUI();
newQ();
}

// SAVE
function save(){
localStorage.setItem("state", JSON.stringify(state));
}

// UI
function updateUI(){
document.getElementById("streak").innerText=state.streak;
document.getElementById("hearts").innerText="❤️".repeat(state.hearts);

document.getElementById("bar").style.width=(state.xp%10)*10+"%";

document.getElementById("level").innerText="Niveau "+state.level;

let avatar="🙂", rank="Débutant";
if(state.xp>10){avatar="😎";rank="Apprenti";}
if(state.xp>30){avatar="🤖";rank="Expert";}
if(state.xp>60){avatar="👑";rank="Maître";}

document.getElementById("avatar").innerText=avatar;
document.getElementById("rank").innerText=rank;

let b="";
if(state.xp>10) b+="🥉 ";
if(state.xp>30) b+="🥈 ";
if(state.xp>60) b+="🥇 ";
document.getElementById("badges").innerText=b;

loadLevels();
}

// INIT
updateUI();

</script>

</body>
</html>
